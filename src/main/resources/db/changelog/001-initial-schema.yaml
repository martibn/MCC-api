databaseChangeLog:
  - changeSet:
      id: 1
      author: mburgas
      changes:
        - sql:
            comment: Enable PostGIS extension
            sql: CREATE EXTENSION IF NOT EXISTS postgis;
      rollback:
        - sql: DROP EXTENSION IF EXISTS postgis;

  - changeSet:
      id: 2
      author: mburgas
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: avatar_url
                  type: VARCHAR(512)
                  constraints:
                    nullable: true
              - column:
                  name: auth_provider
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: provider_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createTable:
            tableName: locations
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: GEOGRAPHY(Point, 4326)
                  constraints:
                    nullable: false
              - column:
                  name: service_category
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: UUID
                  constraints:
                    nullable: true
                    foreignKeyName: fk_locations_created_by
                    references: users(id)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createTable:
            tableName: card_acceptances
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: location_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_card_acceptances_location
                    references: locations(id)
              - column:
                  name: card_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: works
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: reported_by
                  type: UUID
                  constraints:
                    nullable: true
                    foreignKeyName: fk_card_acceptances_reported_by
                    references: users(id)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - sql:
            comment: Create spatial index on locations
            sql: CREATE INDEX idx_locations_location ON locations USING GIST (location);
      rollback:
        - dropTable:
            tableName: card_acceptances
        - dropTable:
            tableName: locations
        - dropTable:
            tableName: users
