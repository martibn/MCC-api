databaseChangeLog:
  - changeSet:
      id: 1
      author: mburgas
      changes:
        - sql:
            comment: Enable PostGIS extension
            sql: CREATE EXTENSION IF NOT EXISTS postgis;
      rollback:
        - sql: DROP EXTENSION IF EXISTS postgis;

  - changeSet:
      id: 2
      author: mburgas
      changes:
        - sql:
            sql: CREATE TABLE IF NOT EXISTS users (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, email VARCHAR(255) NOT NULL UNIQUE, password_hash VARCHAR(255), name VARCHAR(255) NOT NULL, avatar_url VARCHAR(512), auth_provider VARCHAR(50) NOT NULL, provider_id VARCHAR(255), created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP NOT NULL)

  - changeSet:
      id: 3
      author: mburgas
      changes:
        - sql:
            sql: CREATE TABLE IF NOT EXISTS locations (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, name VARCHAR(255) NOT NULL, address TEXT NOT NULL, location GEOGRAPHY(Point, 4326) NOT NULL, service_category VARCHAR(50) NOT NULL, created_by UUID REFERENCES users(id), created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP NOT NULL, updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP NOT NULL)

  - changeSet:
      id: 4
      author: mburgas
      changes:
        - sql:
            sql: CREATE TABLE IF NOT EXISTS card_acceptances (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, location_id UUID NOT NULL REFERENCES locations(id), card_type VARCHAR(50) NOT NULL, works BOOLEAN NOT NULL, reported_by UUID REFERENCES users(id), created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP NOT NULL)

  - changeSet:
      id: 5
      author: mburgas
      changes:
        - sql:
            sql: CREATE INDEX IF NOT EXISTS idx_locations_location ON locations USING GIST (location)