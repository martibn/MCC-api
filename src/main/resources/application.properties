server.port=8080

spring.application.name=mcc-api

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mcc}
spring.datasource.username=${DB_USER:mcc}
spring.datasource.password=${DB_PASSWORD:mcc}
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# JWT
jwt.secret=${JWT_SECRET:default-secret-change-in-production-very-long-secret-key}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

# Google OAuth (opcional, per login amb Google)
# spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
