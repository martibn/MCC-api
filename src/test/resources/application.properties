spring.liquibase.enabled=false
spring.datasource.url=jdbc:hsqldb:mem:testdb;shutdown=true
spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
spring.jpa.hibernate.ddl-auto=none
